<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar-expand-lg bg-primary d-flex align-items-center justify-content-between p-2 text-white">
        <h2 class="navbar-brand fw-bold">Shop</h2>
        <div class="links navbar d-flex justify-content-end gap-4">
            <a href="register.html" class="nav-link">Register</a>
            <a href="login.html" class="nav-link">Login</a>
            <a href="catalog.html" class="nav-link">Catalog</a>
            <a href="cart.html" class="nav-link">Cart</a>
        </div>   
    </nav>
    <div class="d-flex justify-content-center align-items-center m-5">
        <div class="card p-3 shadow-sm w-100" style="max-width: 450px;">
            <div class="card-body d-flex flex-column align-items-center gap-3">
                <h3>Register</h3>
                <form id="regForm" class="gap-3 d-flex flex-column" style="width: 21em;">
                    <input type="text" id = "rName" class="w-100 form-control" placeholder="Name">
                    <input type="email" id = "rUser" class="w-100 form-control" placeholder="Email">
                    <input type="password" id = "rPass" class="w-100 form-control" placeholder="Password">
                    <div class="rErr text-danger" id="err-div"></div>
                    <button  type="submit" class="btn btn-primary rounded-pill" >Register</button>
                </form>
            </div>
        </div> 
    </div>
    <script src="script.js"></script>
</body>
</html>
