<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <style>
        :root {
            --bg: #F4F7FA;
            --panel: #ffffff;
            --primary: #34699A;
            --text: #1F2933;
            --muted: #556471;
            --border: rgba(63, 84, 112, 0.14);
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(52, 105, 154, 0.12), transparent 28%),
                        linear-gradient(180deg, #eef4fb 0%, #f8fbfd 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }
        .page-card {
            width: 100%;
            max-width: 540px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 30px 70px rgba(37, 78, 126, 0.09);
            padding: 36px;
        }
        .page-header {
            margin-bottom: 26px;
            text-align: center;
        }
        .page-header h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: -0.04em;
        }
        .page-header p {
            margin: 12px auto 0;
            max-width: 420px;
            color: var(--muted);
            line-height: 1.7;
        }
        .form-grid {
            display: grid;
            gap: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #fbfdff;
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(52, 105, 154, 0.12);
        }
        button {
            width: 100%;
            padding: 16px 18px;
            border: none;
            border-radius: 999px;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 32px rgba(52, 105, 154, 0.18);
        }
        .view-link {
            text-align: center;
            margin-top: 22px;
        }
        .view-link a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border-radius: 999px;
            border: 1px solid var(--primary);
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: background-color 0.18s ease, color 0.18s ease;
        }
        .view-link a:hover {
            background: rgba(52, 105, 154, 0.08);
            color: var(--primary);
        }
        @media (max-width: 520px) {
            .page-card {
                padding: 28px 22px;
            }
            .page-header h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="page-card">
        <div class="page-header">
            <h1>Add Student</h1>
            <p>Enter the student details below and save the record to the class registry.</p>
        </div>

        <form action="student" method="post">
            <div class="form-grid">
                <div>
                    <label for="name">Name</label>
                    <input id="name" type="text" name="name" required>
                </div>

                <div>
                    <label for="age">Age</label>
                    <input id="age" type="number" name="age" required>
                </div>

                <div>
                    <label for="course">Course</label>
                    <input id="course" type="text" name="course" required>
                </div>
            </div>

            <button type="submit">Add Student</button>
        </form>

        <div class="view-link">
            <a href="view">View Students</a>
        </div>
    </div>
</body>
</html>
