<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 450px;
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: none;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
            font-weight: 600;
        }

        label {
            display: block;
            margin-top: 20px;
            font-weight: 500;
            color: #555;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin-top: 8px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            background: #f8f9fa;
            font-size: 16px;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: #ffffff;
        }

        button {
            width: 100%;
            margin-top: 30px;
            padding: 15px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .view-link {
            text-align: center;
            margin-top: 25px;
        }

        .view-link a {
            text-decoration: none;
            padding: 12px 25px;
            border: 2px solid #667eea;
            background: transparent;
            color: #667eea;
            display: inline-block;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .view-link a:hover {
            background: #667eea;
            color: white;
        }
    </style>

</head>
<body>

    <div class="container">
        <h2>Add Student</h2>

        <form action="student" method="post">
            <label>Name</label>
            <input type="text" name="name" required>

            <label>Age</label>
            <input type="number" name="age" required>

            <label>Course</label>
            <input type="text" name="course" required>

            <button type="submit">Add Student</button>
        </form>

        <div class="view-link">
            <a href="view">View Students</a>
        </div>
    </div>

</body>
</html>
